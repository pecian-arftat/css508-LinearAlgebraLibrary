# This GitHub Actions workflow is designed to automate the build and testing process for a C++ project that uses Google Test (GTest). 
# It triggers on pushes and pull requests to the master branch, ensuring that your tests are run whenever changes are made.
name: GTest CI

on:
  push:
    branches: [ "master" ] # Triggers on push to the main branch
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Gets a copy of your code

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libgtest-dev

    - name: Configure CMake
      # Assuming your project uses CMake to find GTest
      run: cmake -S ./LA-TEST-ENV -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Run Tests
      # Replace 'my_test_executable' with your actual test binary name
      working-directory: LA-TEST-ENV
      run: ctest --output-on-failure
